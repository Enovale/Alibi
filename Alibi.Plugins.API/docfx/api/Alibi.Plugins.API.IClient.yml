  assemblies:
  - Alibi.Plugins.API
  namespace: Alibi.Plugins.API
  summary: Ban this player's hardware ID, ensuring they don't rejoin under a proxy.
  remarks: >-
    If possible, this should always be used when banning, on top of IP banning.

    It ensures the player can't use a proxy, VPN, or a change of IP to bypass the ban.
  example: []
  syntax:
    content: void BanHwid(string reason, TimeSpan? expireDate, IClient? banner)
    parameters:
    - id: reason
      type: System.String
      description: Why the client is being banned
    - id: expireDate
      type: System.Nullable{System.TimeSpan}
      description: When their ban will expire (null for an indefinite ban)
    - id: banner
      type: Alibi.Plugins.API.IClient
      description: Who banned this client (null if the server banned them)
    content.vb: Sub BanHwid(reason As String, expireDate As TimeSpan?, banner As IClient)
