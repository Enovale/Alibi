  assemblies:
  - Alibi.Plugins.API
  namespace: Alibi.Plugins.API
  summary: Deletes a login registered in the database.
  remarks: >-
    Doing this will NOT log out players that already used this login.

    Do not use this as a token revocation system of sorts, unless you

    also find those logged in users and log them out.
  example: []
  syntax:
    content: bool RemoveLogin(string username)
    parameters:
    - id: username
      type: System.String
      description: The login to delete
    return:
      type: System.Boolean
      description: Whether or not this operation was successful
