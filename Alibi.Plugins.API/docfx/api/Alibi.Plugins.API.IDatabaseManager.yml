  assemblies:
  - Alibi.Plugins.API
  namespace: Alibi.Plugins.API
  summary: >-
    Registers a ban for an IP in the database. This won't take effect

    until the player rejoins the server. Instead use IClient.BanIP
  remarks: Try to never use this ban method as it is insecure. Use HWID banning whenever possible.
  example: []
  syntax:
    content: void BanIp(IPAddress ip, string reason, TimeSpan? expireTime = null)
    parameters:
    - id: ip
      type: System.Net.IPAddress
      description: The IP Address to ban
    - id: reason
      type: System.String
      description: Why they are being banned
    - id: expireTime
      type: System.Nullable{System.TimeSpan}
      description: When to let this  ban expire (null if indefinite)
