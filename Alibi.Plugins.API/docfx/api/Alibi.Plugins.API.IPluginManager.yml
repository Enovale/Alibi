  assemblies:
  - Alibi.Plugins.API
  namespace: Alibi.Plugins.API
  summary: >-
    Gets the absolute path to the configuration folder assigned to this plugin.

    ONLY use this folder as otherwise users will be confused and it creates non-standard code.
  example: []
  syntax:
    content: string GetConfigFolder(string id)
    parameters:
    - id: id
      type: System.String
      description: The ID of the plugin to fetch the config folder of (not necessarily your own)
    return:
      type: System.String
      description: An absolute path to that plugin's config folder
